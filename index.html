<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpenClaw 一键部署</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
.container { background: #1e293b; border-radius: 16px; padding: 40px; max-width: 520px; width: 90%; box-shadow: 0 20px 60px rgba(0,0,0,0.5); }
h1 { text-align: center; font-size: 28px; margin-bottom: 8px; }
h1 span { color: #38bdf8; }
.subtitle { text-align: center; color: #94a3b8; margin-bottom: 32px; font-size: 14px; }
label { display: block; font-size: 14px; font-weight: 600; margin-bottom: 6px; color: #cbd5e1; }
.form-group { margin-bottom: 20px; }
.btn-group { display: flex; gap: 8px; }
.btn-group button { flex: 1; padding: 10px; border: 2px solid #334155; border-radius: 8px; background: #0f172a; color: #94a3b8; cursor: pointer; font-size: 14px; transition: all .2s; }
.btn-group button:hover { border-color: #475569; color: #e2e8f0; }
.btn-group button.active { border-color: #38bdf8; color: #38bdf8; background: #0c4a6e; }
input { width: 100%; padding: 10px 14px; border: 2px solid #334155; border-radius: 8px; background: #0f172a; color: #e2e8f0; font-size: 14px; outline: none; transition: border-color .2s; }
input:focus { border-color: #38bdf8; }
input::placeholder { color: #475569; }
#generate-btn { width: 100%; padding: 14px; border: none; border-radius: 10px; background: linear-gradient(135deg, #0ea5e9, #6366f1); color: #fff; font-size: 16px; font-weight: 700; cursor: pointer; transition: opacity .2s; }
#generate-btn:hover { opacity: 0.9; }
.msg { text-align: center; margin-top: 12px; font-size: 13px; min-height: 20px; }
.msg.ok { color: #4ade80; } .msg.err { color: #f87171; }
.hidden { display: none !important; }
.guide { margin-top: 20px; background: #0f172a; border-radius: 10px; padding: 20px; border: 1px solid #334155; }
.guide h3 { font-size: 15px; margin-bottom: 12px; color: #38bdf8; }
.guide ol { padding-left: 20px; font-size: 13px; line-height: 2; color: #cbd5e1; }
.guide .cmd-box { display: flex; align-items: center; gap: 8px; margin: 10px 0; background: #1e293b; border-radius: 8px; padding: 10px 14px; font-family: monospace; font-size: 13px; color: #4ade80; word-break: break-all; }
.guide .cmd-box button { flex-shrink: 0; padding: 4px 12px; border: 1px solid #475569; border-radius: 6px; background: #334155; color: #e2e8f0; cursor: pointer; font-size: 12px; }
.guide .cmd-box button:hover { background: #475569; }
</style>
</head>
<body>
<div class="container">
  <h1>🐾 Open<span>Claw</span></h1>
  <p class="subtitle">选择配置，一键生成部署脚本</p>
  <div class="form-group">
    <label>操作系统</label>
    <div id="os-select" class="btn-group"></div>
  </div>
  <div class="form-group">
    <label>AI 模型提供商</label>
    <div id="provider-select" class="btn-group"></div>
  </div>
  <div class="form-group" id="apikey-group">
    <label>API Key</label>
    <input type="password" id="apikey" placeholder="输入你的 API Key">
  </div>
  <button id="generate-btn" onclick="generateScript()">生成部署脚本</button>
  <p id="msg" class="msg"></p>
  <div id="guide" class="guide hidden"></div>
</div>
<script>
const state = { os: 'windows', provider: 'anthropic' };
const providers = {
  anthropic: { provider: 'anthropic', model: 'claude-sonnet-4-20250514', needKey: true },
  openai: { provider: 'openai', model: 'gpt-4o', needKey: true },
  ollama: { provider: 'ollama', model: 'llama3', baseUrl: 'http://localhost:11434', needKey: false }
};
function createBtnGroup(id, opts, key) {
  const el = document.getElementById(id);
  opts.forEach(([v, l]) => {
    const b = document.createElement('button');
    b.textContent = l; b.className = v === state[key] ? 'active' : '';
    b.onclick = () => {
      state[key] = v;
      el.querySelectorAll('button').forEach(x => x.classList.remove('active'));
      b.classList.add('active');
      if (key === 'provider') toggleKey();
      document.getElementById('guide').classList.add('hidden');
    };
    el.appendChild(b);
  });
}
function toggleKey() {
  document.getElementById('apikey-group').classList.toggle('hidden', !providers[state.provider].needKey);
}
createBtnGroup('os-select', [['windows','Windows'],['macos','macOS']], 'os');
createBtnGroup('provider-select', [['anthropic','Anthropic'],['openai','OpenAI'],['ollama','Ollama']], 'provider');
toggleKey();

function copyCmd(text, btn) {
  navigator.clipboard.writeText(text);
  btn.textContent = '已复制'; setTimeout(() => btn.textContent = '复制', 1500);
}

function generateScript() {
  const msg = document.getElementById('msg');
  const guide = document.getElementById('guide');
  const p = providers[state.provider];
  const key = document.getElementById('apikey').value.trim();
  if (p.needKey && !key) { msg.className='msg err'; msg.textContent='请输入 API Key'; return; }
  const cfg = { provider: p.provider, model: p.model };
  if (key) cfg.apiKey = key;
  if (p.baseUrl) cfg.baseUrl = p.baseUrl;
  const json = JSON.stringify(cfg, null, 2);
  let script, filename;
  if (state.os === 'windows') { script = genWin(json); filename = 'openclaw-deploy.bat'; }
  else { script = genMac(json); filename = 'openclaw-deploy.sh'; }
  const blob = new Blob([script], { type: 'application/octet-stream' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob); a.download = filename; a.click();
  URL.revokeObjectURL(a.href);
  msg.className = 'msg ok'; msg.textContent = '脚本已下载!';
  showGuide(guide, filename);
}

function showGuide(el, filename) {
  if (state.os === 'windows') {
    el.innerHTML = '<h3>下一步：运行脚本</h3><ol>' +
      '<li>找到下载的 <b>' + filename + '</b> 文件</li>' +
      '<li>双击运行（如弹出安全提示，点"更多信息"→"仍要运行"）</li>' +
      '<li>等待自动安装完成，浏览器会自动打开</li></ol>';
  } else {
    const cmd = 'bash ~/Downloads/' + filename;
    el.innerHTML = '<h3>下一步：运行脚本</h3><ol>' +
      '<li>打开 <b>终端</b>（在启动台搜索"终端"或"Terminal"）</li>' +
      '<li>复制粘贴下面的命令，按回车：</li></ol>' +
      '<div class="cmd-box"><span>' + cmd + '</span>' +
      '<button onclick="copyCmd(\'' + cmd + '\', this)">复制</button></div>' +
      '<ol start="3"><li>全自动安装，完成后浏览器自动打开</li></ol>';
  }
  el.classList.remove('hidden');
}

function genMac(json) {
  return [
    '#!/bin/bash', '',
    'echo ""',
    'echo "========================================"',
    'echo "  OpenClaw 一键部署 (macOS)"',
    'echo "  全自动安装，请耐心等待"',
    'echo "========================================"',
    'echo ""', '',
    '# 修复 git SSH 问题，避免依赖拉取失败',
    'git config --global url.https://github.com/.insteadOf ssh://git@github.com/',
    'git config --global url.https://github.com/.insteadOf git@github.com:', '',
    '# 设置 npm 用户目录，不需要 sudo',
    'NPM_DIR="$HOME/.npm-global"',
    'mkdir -p "$NPM_DIR"',
    'npm config set prefix "$NPM_DIR"',
    'export PATH="$NPM_DIR/bin:$PATH"', '',
    '# [1/4] 自动安装 Node.js',
    'echo "[1/4] 准备 Node.js ..."',
    'if command -v node &>/dev/null; then',
    '  echo "  已安装 Node.js $(node -v)"',
    'else',
    '  echo "  未检测到 Node.js，正在自动安装..."',
    '  if command -v brew &>/dev/null; then',
    '    brew install node',
    '  else',
    '    ARCH=$(uname -m)',
    '    NODE_VER="v22.14.0"',
    '    if [ "$ARCH" = "arm64" ]; then',
    '      NODE_PKG="node-${NODE_VER}-darwin-arm64.tar.gz"',
    '    else',
    '      NODE_PKG="node-${NODE_VER}-darwin-x64.tar.gz"',
    '    fi',
    '    echo "  正在下载 Node.js ..."',
    '    curl -fsSL "https://nodejs.org/dist/${NODE_VER}/${NODE_PKG}" -o /tmp/node.tar.gz',
    '    mkdir -p "$HOME/.local/nodejs"',
    '    tar -xzf /tmp/node.tar.gz -C "$HOME/.local/nodejs"',
    '    export PATH="$HOME/.local/nodejs/node-${NODE_VER}-darwin-${ARCH}/bin:$PATH"',
    '    rm /tmp/node.tar.gz',
    '  fi',
    '  echo "  Node.js $(node -v) 安装完成"',
    'fi',
    'echo ""', '',
    '# [2/4] 安装 OpenClaw',
    'echo "[2/4] 安装 OpenClaw ..."',
    'npm install -g openclaw@latest',
    'if [ $? -ne 0 ]; then',
    '  echo "  安装失败，请检查网络后重试"',
    '  exit 1',
    'fi',
    'echo "  安装完成"',
    'echo ""', '',
    '# [3/4] 写入配置',
    'echo "[3/4] 写入配置 ..."',
    'mkdir -p "$HOME/.openclaw"',
    "cat > \"$HOME/.openclaw/openclaw.json\" << 'EOFCONFIG'",
    json,
    'EOFCONFIG',
    'echo "  配置已写入"',
    'echo ""', '',
    '# [4/4] 启动',
    'echo "[4/4] 启动 OpenClaw ..."',
    'echo "  浏览器将自动打开 http://127.0.0.1:18789/"',
    'echo "  按 Ctrl+C 停止服务"',
    'echo ""',
    'sleep 2 && open "http://127.0.0.1:18789/" &',
    '"$NPM_DIR/bin/openclaw" gateway || openclaw gateway',
  ].join('\n');
}

function genWin(json) {
  const jl = json.split('\n');
  let wj = 'echo ' + jl[0] + ' > "%USERPROFILE%\\.openclaw\\openclaw.json"\r\n';
  for (let i = 1; i < jl.length; i++) wj += 'echo ' + jl[i] + ' >> "%USERPROFILE%\\.openclaw\\openclaw.json"\r\n';
  return [
    '@echo off', 'chcp 65001 >nul', 'title OpenClaw 一键部署',
    'echo.', 'echo ========================================',
    'echo   OpenClaw 一键部署 (Windows)', 'echo   全自动安装，请耐心等待',
    'echo ========================================', 'echo.', '',
    'echo [1/4] 准备 Node.js ...', 'where node >nul 2>nul',
    'if %errorlevel% equ 0 (',
    '  for /f "tokens=*" %%i in (\'node -v\') do echo   已安装 Node.js %%i',
    '  goto :node_ok', ')',
    'echo   未检测到 Node.js，正在自动安装...',
    'echo   正在下载 Node.js 安装包（约30MB）...',
    'powershell -Command "Invoke-WebRequest -Uri \'https://nodejs.org/dist/v22.14.0/node-v22.14.0-x64.msi\' -OutFile \'%TEMP%\\node_install.msi\'"',
    'if %errorlevel% neq 0 (',
    '  echo   下载失败，请检查网络后重试', '  pause', '  exit /b 1', ')',
    'echo   正在安装 Node.js ...',
    'msiexec /i "%TEMP%\\node_install.msi" /qn /norestart',
    'set "PATH=%ProgramFiles%\\nodejs;%PATH%"',
    'del "%TEMP%\\node_install.msi"',
    'echo   Node.js 安装完成',
    ':node_ok', 'echo.', '',
    'echo [2/4] 安装 OpenClaw ...',
    'call npm install -g openclaw@latest',
    'if %errorlevel% neq 0 ( echo   安装失败，请检查网络 & pause & exit /b 1 )',
    'echo   安装完成', 'echo.', '',
    'echo [3/4] 写入配置 ...',
    'if not exist "%USERPROFILE%\\.openclaw" mkdir "%USERPROFILE%\\.openclaw"',
  ].join('\r\n') + '\r\n' + wj + [
    'echo   配置已写入', 'echo.', '',
    'echo [4/4] 启动 OpenClaw ...', 'echo.',
    'echo   浏览器将自动打开 http://127.0.0.1:18789/',
    'echo   关闭此窗口即可停止服务', 'echo.',
    'start http://127.0.0.1:18789/',
    'call openclaw gateway',
  ].join('\r\n');
}
</script>
</body>
</html>
