<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 助手一键部署</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
.container { background: #1e293b; border-radius: 16px; padding: 40px; max-width: 540px; width: 90%; box-shadow: 0 20px 60px rgba(0,0,0,0.5); }
h1 { text-align: center; font-size: 26px; margin-bottom: 6px; }
h1 span { color: #38bdf8; }
.subtitle { text-align: center; color: #94a3b8; margin-bottom: 28px; font-size: 13px; }
label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; color: #cbd5e1; }
.form-group { margin-bottom: 18px; }
.btn-group { display: flex; gap: 8px; }
.btn-group button { flex: 1; padding: 10px; border: 2px solid #334155; border-radius: 8px; background: #0f172a; color: #94a3b8; cursor: pointer; font-size: 13px; transition: all .2s; }
.btn-group button:hover { border-color: #475569; color: #e2e8f0; }
.btn-group button.active { border-color: #38bdf8; color: #38bdf8; background: #0c4a6e; }
input { width: 100%; padding: 10px 14px; border: 2px solid #334155; border-radius: 8px; background: #0f172a; color: #e2e8f0; font-size: 13px; outline: none; transition: border-color .2s; }
input:focus { border-color: #38bdf8; }
input::placeholder { color: #475569; }
.gen-btn { width: 100%; padding: 14px; border: none; border-radius: 10px; background: linear-gradient(135deg, #0ea5e9, #6366f1); color: #fff; font-size: 15px; font-weight: 700; cursor: pointer; transition: opacity .2s; }
.gen-btn:hover { opacity: 0.9; }
.msg { text-align: center; margin-top: 10px; font-size: 13px; min-height: 18px; }
.msg.ok { color: #4ade80; } .msg.err { color: #f87171; }
.hidden { display: none !important; }
.guide { margin-top: 18px; background: #0f172a; border-radius: 10px; padding: 18px; border: 1px solid #334155; }
.guide h3 { font-size: 14px; margin-bottom: 10px; color: #38bdf8; }
.guide ol { padding-left: 18px; font-size: 13px; line-height: 2.2; color: #cbd5e1; }
.cmd-box { display: flex; align-items: center; gap: 8px; margin: 8px 0; background: #1e293b; border-radius: 8px; padding: 10px 14px; font-family: monospace; font-size: 12px; color: #4ade80; word-break: break-all; }
.cmd-box button { flex-shrink: 0; padding: 4px 10px; border: 1px solid #475569; border-radius: 6px; background: #334155; color: #e2e8f0; cursor: pointer; font-size: 11px; }
.cmd-box button:hover { background: #475569; }
.tip { color: #94a3b8; font-size: 12px; margin-top: 8px; line-height: 1.6; }
</style>
</head>
<body>
<div class="container">
  <h1>🤖 AI 助手<span>一键部署</span></h1>
  <p class="subtitle">基于 Open WebUI，无需 Docker，轻量快速</p>
  <div class="form-group">
    <label>操作系统</label>
    <div id="os-select" class="btn-group"></div>
  </div>
  <div class="form-group">
    <label>API Key</label>
    <input type="password" id="apikey" placeholder="输入你的 API Key">
  </div>
  <div class="form-group">
    <label>中转地址 <span style="color:#475569;font-weight:400">（可选，留空用官方地址）</span></label>
    <input type="text" id="baseurl" placeholder="例如 https://api.example.com/v1">
  </div>
  <button class="gen-btn" onclick="generate()">一键部署</button>
  <p id="msg" class="msg"></p>
  <div id="guide" class="guide hidden"></div>
</div>
<script>
var state = { os: 'windows' };
var osEl = document.getElementById('os-select');
[['windows','Windows'],['macos','macOS']].forEach(function(item) {
  var b = document.createElement('button');
  b.textContent = item[1];
  b.className = item[0] === state.os ? 'active' : '';
  b.onclick = function() {
    state.os = item[0];
    osEl.querySelectorAll('button').forEach(function(x){ x.classList.remove('active'); });
    b.classList.add('active');
    document.getElementById('guide').classList.add('hidden');
  };
  osEl.appendChild(b);
});

function copyCmd(text, btn) {
  navigator.clipboard.writeText(text);
  btn.textContent = '已复制';
  setTimeout(function(){ btn.textContent = '复制'; }, 1500);
}

function generate() {
  var msg = document.getElementById('msg');
  var guide = document.getElementById('guide');
  var key = document.getElementById('apikey').value.trim();
  var baseurl = document.getElementById('baseurl').value.trim().replace(/\/$/,'');
  if (!key) { msg.className='msg err'; msg.textContent='请输入 API Key'; return; }
  var openaiBase = baseurl || 'https://api.openai.com/v1';

  if (state.os === 'windows') {
    var script = genWin(key, openaiBase);
    var blob = new Blob([script], {type:'application/octet-stream'});
    var a = document.createElement('a');
    a.href = URL.createObjectURL(blob); a.download = 'install-ai.bat'; a.click();
    URL.revokeObjectURL(a.href);
    msg.className='msg ok'; msg.textContent='脚本已下载！';
    showWinGuide(guide);
  } else {
    var script = genMac(key, openaiBase);
    msg.className='msg ok'; msg.textContent='';
    showMacGuide(guide, script);
  }
}

function genWin(key, openaiBase) {
  return [
    '@echo off', 'chcp 65001 >nul', 'title AI 助手一键部署',
    'echo.', 'echo ========================================',
    'echo   AI 助手一键部署 (Windows)',
    'echo   无需 Docker，轻量安装',
    'echo ========================================', 'echo.',
    '',
    'echo [1/3] 安装 uv 包管理器...',
    'where uv >nul 2>nul',
    'if %errorlevel% equ 0 (',
    '  echo   uv 已安装',
    '  goto :uv_ok',
    ')',
    'powershell -ExecutionPolicy ByPass -Command "irm https://astral.sh/uv/install.ps1 | iex"',
    'set "PATH=%USERPROFILE%\\.local\\bin;%PATH%"',
    ':uv_ok', 'echo.',
    '',
    'echo [2/3] 配置环境变量...',
    'setx OPENAI_API_KEY "' + key + '" >nul',
    'setx OPENAI_API_BASE_URL "' + openaiBase + '" >nul',
    'set "OPENAI_API_KEY=' + key + '"',
    'set "OPENAI_API_BASE_URL=' + openaiBase + '"',
    'set "DATA_DIR=%USERPROFILE%\\.open-webui"',
    'echo   配置完成', 'echo.',
    '',
    'echo [3/3] 启动 Open WebUI...',
    'echo   首次启动需下载依赖，请耐心等待...',
    'echo   启动后浏览器将自动打开',
    'echo.',
    'start /b cmd /c "timeout /t 15 /nobreak >nul && start http://localhost:8080/"',
    'uvx --python 3.11 open-webui@latest serve',
  ].join('\r\n');
}

function genMac(key, openaiBase) {
  return [
    '#!/bin/bash',
    'echo ""',
    'echo "========================================"',
    'echo "  AI 助手一键部署 (macOS)"',
    'echo "  无需 Docker，轻量安装"',
    'echo "========================================"',
    'echo ""',
    '',
    'echo "[1/3] 安装 uv 包管理器..."',
    'if ! command -v uv &>/dev/null; then',
    '  curl -LsSf https://astral.sh/uv/install.sh | sh',
    '  export PATH="$HOME/.local/bin:$PATH"',
    'fi',
    'echo "  uv 已就绪"',
    'echo ""',
    '',
    'echo "[2/3] 配置环境变量..."',
    'export OPENAI_API_KEY="' + key + '"',
    'export OPENAI_API_BASE_URL="' + openaiBase + '"',
    'export DATA_DIR="$HOME/.open-webui"',
    '# 写入 zshrc 持久化',
    'grep -q "OPENAI_API_KEY" ~/.zshrc 2>/dev/null || {',
    '  echo \'export OPENAI_API_KEY="' + key + '"\' >> ~/.zshrc',
    '  echo \'export OPENAI_API_BASE_URL="' + openaiBase + '"\' >> ~/.zshrc',
    '}',
    'echo "  配置完成"',
    'echo ""',
    '',
    'echo "[3/3] 启动 Open WebUI..."',
    'echo "  首次启动需下载依赖，请耐心等待..."',
    'echo "  启动后浏览器将自动打开 http://localhost:8080"',
    'echo ""',
    'sleep 15 && open "http://localhost:8080/" &',
    'DATA_DIR="$HOME/.open-webui" uvx --python 3.11 open-webui@latest serve',
  ].join('\n');
}

function showWinGuide(el) {
  el.innerHTML = '<h3>下一步</h3><ol>'+
    '<li>找到下载的 <b>install-ai.bat</b></li>'+
    '<li>双击运行（如弹出安全提示，点"更多信息"→"仍要运行"）</li>'+
    '<li>等待安装完成，浏览器自动打开</li></ol>'+
    '<p class="tip">首次安装约需2-5分钟，请保持网络畅通</p>';
  el.classList.remove('hidden');
}

function showMacGuide(el, script) {
  var encoded = btoa(unescape(encodeURIComponent(script)));
  var cmd = 'echo ' + encoded + ' | base64 -d | bash';
  el.innerHTML = '<h3>只需两步</h3><ol>'+
    '<li>按 <b>Command+空格</b>，输入 Terminal，回车</li>'+
    '<li>点复制，粘贴到终端，按回车：</li></ol>'+
    '<div class="cmd-box"><span id="mac-cmd" style="user-select:all">'+cmd+'</span>'+
    '<button onclick="copyCmd(document.getElementById(\'mac-cmd\').textContent,this)">复制</button></div>'+
    '<p class="tip">等待安装完成，浏览器自动打开 http://localhost:8080</p>';
  el.classList.remove('hidden');
}
</script>
</body>
</html>
